<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Neumorphism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #e0e5ec; }
        .neu-flat {
            background: #e0e5ec;
            box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
        }
        .neu-inset {
            background: #e0e5ec;
            box-shadow: inset 6px 6px 12px rgba(163, 177, 198, 0.6), inset -6px -6px 12px rgba(255, 255, 255, 0.5);
        }
        .neu-button {
            background: #e0e5ec;
            box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.6), -6px -6px 12px rgba(255, 255, 255, 0.5);
        }
        .neu-button:active {
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="neu-flat p-8 rounded-[40px] w-80 text-center">
        <div class="neu-inset w-48 h-48 mx-auto rounded-full flex items-center justify-center mb-8 overflow-hidden">
             <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400" alt="Album Cover" class="opacity-80">
        </div>
        <h2 class="text-slate-600 font-bold text-xl mb-1">Midnight City</h2>
        <p class="text-slate-400 text-sm mb-8">M83</p>
        
        <div class="neu-inset h-2 rounded-full mb-8 relative">
            <div class="bg-blue-400 h-full w-1/3 rounded-full shadow-[0_0_10px_rgba(96,165,250,0.5)]"></div>
        </div>
        
        <div class="flex justify-between items-center px-4">
            <button class="neu-button w-12 h-12 rounded-full flex items-center justify-center text-slate-500">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M8.445 14.832A1 1 0 0010 14v-2.798l5.445 3.63A1 1 0 0017 14V6a1 1 0 00-1.555-.832L10 8.798V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z"></path></svg>
            </button>
            <button id="play" class="neu-button w-16 h-16 rounded-full flex items-center justify-center text-blue-500">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
            </button>
            <button class="neu-button w-12 h-12 rounded-full flex items-center justify-center text-slate-500">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832L10 11.202V14a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4A1 1 0 0010 6v2.798L4.555 5.168z"></path></svg>
            </button>
        </div>
    </div>
    <script>
        const playBtn = document.getElementById('play');
        let playing = false;
        playBtn.onclick = () => {
            playing = !playing;
            playBtn.innerHTML = playing ? 
                '<svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>' : 
                '<svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>';
        }
    </script>
</body>
</html>
