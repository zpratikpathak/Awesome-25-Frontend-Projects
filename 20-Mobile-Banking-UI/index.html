<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora | Advanced Banking UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .phone-container { width: 375px; height: 812px; background: #fff; border-radius: 50px; position: relative; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.1), 0 0 0 10px #000; }
        .glass-card { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); position: relative; overflow: hidden; }
        .glass-card::before { content: ''; position: absolute; top: -20%; right: -20%; width: 150px; height: 150px; background: rgba(255,255,255,0.1); rounded-full blur-3xl; }
        .nav-item-active { color: #4f46e5; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        .notch { width: 160px; height: 30px; background: #000; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 50; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-100">
    <div class="phone-container flex flex-col">
        <!-- iOS Style Notch -->
        <div class="notch"></div>
        
        <!-- Status Bar -->
        <div class="h-12 px-8 flex justify-between items-end pb-1 shrink-0">
            <span class="text-xs font-bold">9:41</span>
            <div class="flex items-center space-x-1.5">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
                <div class="w-6 h-3 border border-black rounded-sm p-0.5 flex items-center"><div class="w-full h-full bg-black rounded-sm"></div></div>
            </div>
        </div>

        <header class="p-8 flex justify-between items-center shrink-0">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-slate-100 rounded-2xl flex items-center justify-center shadow-sm"><svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"></path></svg></div>
            </div>
            <div class="flex items-center space-x-3">
                <div class="text-right">
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Morning</div>
                    <div class="text-sm font-black italic tracking-tighter">Pratik P.</div>
                </div>
                <div class="w-10 h-10 rounded-[14px] bg-indigo-100 border-2 border-white shadow-sm overflow-hidden grayscale">
                     <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <main class="flex-1 px-8 overflow-y-auto custom-scrollbar pb-24">
            <!-- Balance Card -->
            <div class="glass-card rounded-[40px] p-8 mb-10 text-white shadow-2xl shadow-indigo-200 relative overflow-hidden group">
                <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-white/10 rounded-full group-hover:scale-150 transition-transform duration-1000"></div>
                <div class="text-[10px] font-black uppercase tracking-[0.3em] opacity-60 mb-3">Available Liquidity</div>
                <div class="text-4xl font-black italic tracking-tighter mb-10">$12,482<span class="text-xl opacity-40">.00</span></div>
                
                <div class="flex justify-between items-end">
                    <div class="flex -space-x-3">
                        <div class="w-8 h-8 rounded-full border-2 border-indigo-400 bg-indigo-500 overflow-hidden shadow-lg"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100"></div>
                        <div class="w-8 h-8 rounded-full border-2 border-indigo-400 bg-indigo-500 overflow-hidden shadow-lg"><img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=100"></div>
                        <div class="w-8 h-8 rounded-full border-2 border-indigo-400 bg-indigo-600 flex items-center justify-center text-[8px] font-bold">+4</div>
                    </div>
                    <div class="text-[8px] font-black uppercase tracking-widest text-indigo-100 italic">SECURE ENGINE V4.2</div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="grid grid-cols-2 gap-4 mb-10">
                <button class="bg-indigo-600 text-white p-6 rounded-[32px] flex flex-col items-center shadow-xl shadow-indigo-100 hover:scale-[0.98] transition-transform">
                    <div class="w-10 h-10 bg-white/20 rounded-2xl flex items-center justify-center mb-4"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg></div>
                    <span class="text-[10px] font-black uppercase tracking-widest">Send Capital</span>
                </button>
                <button class="bg-slate-50 text-indigo-600 p-6 rounded-[32px] flex flex-col items-center hover:scale-[0.98] transition-transform">
                    <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center mb-4 shadow-sm border border-slate-100"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg></div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Request</span>
                </button>
            </div>

            <div class="flex items-center justify-between mb-8">
                <h2 class="text-lg font-black italic uppercase tracking-tight">Recent Activity</h2>
                <button class="text-[10px] font-black uppercase tracking-widest text-indigo-600">Audit All</button>
            </div>

            <!-- Transaction List -->
            <div class="space-y-6">
                <div class="flex items-center justify-between group cursor-pointer">
                    <div class="flex items-center space-x-5">
                        <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500 shadow-sm group-hover:scale-110 transition duration-500">
                             <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        </div>
                        <div>
                            <div class="font-bold text-sm">Apple Store</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Technology</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-black italic text-sm text-red-500">-$1,240.00</div>
                        <div class="text-[8px] text-slate-300 font-bold uppercase mt-1">Today, 08:42</div>
                    </div>
                </div>

                <div class="flex items-center justify-between group cursor-pointer">
                    <div class="flex items-center space-x-5">
                        <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 shadow-sm group-hover:scale-110 transition duration-500">
                             <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        </div>
                        <div>
                            <div class="font-bold text-sm">Vercel Inc.</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Revenue</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-black italic text-sm text-emerald-500">+$4,200.00</div>
                        <div class="text-[8px] text-slate-300 font-bold uppercase mt-1">Yesterday</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Dynamic Tab Bar -->
        <nav class="h-24 px-12 flex items-center justify-between border-t border-slate-50 shrink-0 absolute bottom-0 w-full bg-white/80 backdrop-blur-md z-40">
            <button class="nav-item-active group">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            </button>
            <button class="text-slate-200 group hover:text-indigo-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            </button>
            <button class="text-slate-200 group hover:text-indigo-600 transition-colors">
                 <div class="w-12 h-12 bg-black rounded-full flex items-center justify-center text-white shadow-xl -mt-12 border-[6px] border-white active:scale-90 transition-transform">
                      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                 </div>
            </button>
            <button class="text-slate-200 group hover:text-indigo-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </button>
            <button class="text-slate-200 group hover:text-indigo-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </button>
        </nav>
    </div>
</body>
</html>
