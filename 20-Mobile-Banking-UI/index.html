<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking UI - Mobile First</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div class="w-[375px] h-[812px] bg-white rounded-[40px] shadow-2xl overflow-hidden relative flex flex-col border-[8px] border-slate-900">
        <!-- Status Bar -->
        <div class="h-10 px-8 flex justify-between items-end pb-2">
            <span class="text-xs font-bold">9:41</span>
            <div class="flex space-x-1">
                <div class="w-4 h-2 bg-slate-900 rounded-sm"></div>
                <div class="w-4 h-2 bg-slate-900 rounded-sm"></div>
            </div>
        </div>

        <header class="p-8 flex justify-between items-center">
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </div>
            <div class="w-10 h-10 rounded-full bg-indigo-600 border-4 border-white shadow-sm overflow-hidden">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" alt="Avatar">
            </div>
        </header>

        <main class="flex-1 px-8">
            <h1 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Total Balance</h1>
            <div class="text-4xl font-bold mb-8">$12,450.00</div>
            
            <div class="grid grid-cols-2 gap-4 mb-10">
                <button class="bg-indigo-600 p-6 rounded-[32px] text-white flex flex-col items-center">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-3">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </div>
                    <span class="text-xs font-bold">Send</span>
                </button>
                <button class="bg-slate-100 p-6 rounded-[32px] text-slate-900 flex flex-col items-center">
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center mb-3 shadow-sm">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <span class="text-xs font-bold">Request</span>
                </button>
            </div>

            <h2 class="font-bold text-lg mb-6">Recent Transactions</h2>
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-orange-100 rounded-2xl flex items-center justify-center text-orange-600">
                             <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                        <div>
                            <div class="font-bold">Amazon</div>
                            <div class="text-xs text-slate-400">Shopping</div>
                        </div>
                    </div>
                    <div class="font-bold text-red-500">-$42.00</div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600">
                             <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <div>
                            <div class="font-bold">Freelance</div>
                            <div class="text-xs text-slate-400">Income</div>
                        </div>
                    </div>
                    <div class="font-bold text-emerald-500">+$1,200.00</div>
                </div>
            </div>
        </main>

        <nav class="h-20 border-t border-slate-100 px-10 flex justify-between items-center">
            <svg class="w-6 h-6 text-indigo-600" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </nav>

        <!-- Notch -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-slate-900 rounded-b-2xl"></div>
    </div>
</body>
</html>
