<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Creator - Claymorphism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { background-color: #e0f2fe; font-family: 'Fredoka', sans-serif; }
        .clay-card {
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 16px 16px 32px #bed6e6, 
                        -16px -16px 32px #ffffff,
                        inset 4px 4px 8px rgba(255, 255, 255, 0.5),
                        inset -4px -4px 8px rgba(0, 0, 0, 0.05);
        }
        .clay-button {
            background: #4f46e5;
            border-radius: 24px;
            box-shadow: 4px 4px 8px #bed6e6, 
                        -4px -4px 8px #ffffff,
                        inset 4px 4px 8px rgba(255, 255, 255, 0.2),
                        inset -4px -4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }
        .clay-button:active {
            transform: scale(0.95);
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.2);
        }
        .clay-item {
            background: #f8fafc;
            border-radius: 24px;
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.05),
                        inset -4px -4px 8px rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="clay-card p-12 max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-12">
        <div class="flex flex-col items-center justify-center">
            <div class="clay-item w-full aspect-square relative flex items-center justify-center mb-8">
                <!-- Simple Clay Character SVG -->
                <svg width="200" height="200" viewBox="0 0 200 200" class="drop-shadow-2xl">
                    <circle cx="100" cy="100" r="80" fill="#fecaca" />
                    <circle cx="70" cy="80" r="10" fill="#334155" />
                    <circle cx="130" cy="80" r="10" fill="#334155" />
                    <path d="M70 130 Q100 160 130 130" stroke="#334155" stroke-width="8" fill="none" stroke-linecap="round" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-700">Avatar Builder</h1>
        </div>

        <div class="space-y-8">
            <div>
                <label class="block text-slate-500 font-bold mb-4 uppercase tracking-widest text-sm">Character Name</label>
                <input type="text" class="clay-item w-full p-4 focus:outline-none text-slate-700 font-medium" placeholder="E.g. Clay-Z">
            </div>

            <div>
                <label class="block text-slate-500 font-bold mb-4 uppercase tracking-widest text-sm">Skin Color</label>
                <div class="flex space-x-4">
                    <div class="w-10 h-10 rounded-full bg-rose-200 border-4 border-white shadow-md cursor-pointer"></div>
                    <div class="w-10 h-10 rounded-full bg-amber-200 border-4 border-white shadow-md cursor-pointer"></div>
                    <div class="w-10 h-10 rounded-full bg-orange-200 border-4 border-white shadow-md cursor-pointer"></div>
                </div>
            </div>

            <button class="clay-button w-full py-5 text-white font-bold text-xl uppercase tracking-widest">Create Buddy</button>
        </div>
    </div>
</body>
</html>
