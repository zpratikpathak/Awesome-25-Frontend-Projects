<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home - Neumorphism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #e0e5ec; }
        .neu-flat {
            background: #e0e5ec;
            box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
        }
        .neu-inset {
            background: #e0e5ec;
            box-shadow: inset 6px 6px 12px rgba(163, 177, 198, 0.6), inset -6px -6px 12px rgba(255, 255, 255, 0.5);
        }
        .neu-button {
            background: #e0e5ec;
            box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.6), -6px -6px 12px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }
        .neu-button.active {
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5);
            color: #3b82f6;
        }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen flex items-center justify-center">
    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-12">
        <div class="neu-flat p-10 rounded-[40px]">
            <header class="mb-12">
                <h1 class="text-3xl font-bold text-slate-700">My Sanctuary</h1>
                <p class="text-slate-400 font-medium">17°C · Partly Cloudy</p>
            </header>
            
            <div class="grid grid-cols-2 gap-6">
                <button class="neu-button active p-6 rounded-3xl flex flex-col items-center">
                    <svg class="w-8 h-8 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path></svg>
                    <span class="text-xs font-bold uppercase tracking-widest">Main Lights</span>
                </button>
                <button class="neu-button p-6 rounded-3xl flex flex-col items-center">
                    <svg class="w-8 h-8 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <span class="text-xs font-bold uppercase tracking-widest">Smart TV</span>
                </button>
                <button class="neu-button p-6 rounded-3xl flex flex-col items-center">
                    <svg class="w-8 h-8 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <span class="text-xs font-bold uppercase tracking-widest">A/C Unit</span>
                </button>
                <button class="neu-button p-6 rounded-3xl flex flex-col items-center">
                    <svg class="w-8 h-8 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    <span class="text-xs font-bold uppercase tracking-widest">Security</span>
                </button>
            </div>
        </div>

        <div class="flex flex-col justify-center space-y-8">
            <div class="neu-flat p-8 rounded-[40px]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-slate-600">Living Room Temp</h3>
                    <span class="text-blue-500 font-bold">22°C</span>
                </div>
                <div class="neu-inset h-4 rounded-full relative overflow-hidden">
                    <div class="bg-blue-400 h-full w-[65%] rounded-full shadow-[0_0_15px_rgba(96,165,250,0.5)]"></div>
                </div>
            </div>

            <div class="neu-flat p-8 rounded-[40px]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-slate-600">Energy Usage</h3>
                    <span class="text-emerald-500 font-bold">4.2 kWh</span>
                </div>
                <div class="neu-inset h-4 rounded-full relative overflow-hidden">
                    <div class="bg-emerald-400 h-full w-[40%] rounded-full shadow-[0_0_15px_rgba(52,211,153,0.5)]"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
