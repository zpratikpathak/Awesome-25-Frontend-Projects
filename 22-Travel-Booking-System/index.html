<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Booking - Clean Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hero-gradient { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); }
        .search-panel { margin-top: -60px; }
    </style>
</head>
<body class="text-slate-900">
    <div class="hero-gradient min-h-[400px] p-8 md:p-12 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-96 h-96 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2 blur-3xl"></div>
        
        <nav class="flex justify-between items-center mb-24 relative z-10">
            <div class="text-white font-extrabold text-2xl tracking-tighter flex items-center space-x-2">
                <div class="w-8 h-8 bg-white text-blue-600 rounded-lg flex items-center justify-center text-sm">V</div>
                <span>Voyage</span>
            </div>
            <div class="hidden md:flex space-x-8 text-white/80 font-semibold text-sm">
                <a href="#">Explore</a>
                <a href="#">Flights</a>
                <a href="#">Stays</a>
                <a href="#">Car Hire</a>
            </div>
            <button class="bg-white/20 backdrop-blur-md text-white px-6 py-2 rounded-xl font-bold text-sm border border-white/30 hover:bg-white/30 transition">Sign In</button>
        </nav>

        <div class="max-w-4xl mx-auto text-center relative z-10">
            <h1 class="text-5xl md:text-6xl font-extrabold text-white mb-6 tracking-tight">The world is <br>yours to explore.</h1>
            <p class="text-blue-100 text-lg md:text-xl max-w-2xl mx-auto font-medium">Discover hidden gems and popular destinations with the most seamless booking experience on the web.</p>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 relative z-20 search-panel">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl shadow-blue-900/10 border border-slate-100 grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-bold text-slate-400 tracking-widest ml-1">Destination</label>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center space-x-3">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <input type="text" placeholder="Where to?" class="bg-transparent font-bold text-slate-800 placeholder:text-slate-300 focus:outline-none w-full">
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-bold text-slate-400 tracking-widest ml-1">Dates</label>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center space-x-3">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span class="font-bold text-slate-800 whitespace-nowrap">April 17 - 24</span>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-bold text-slate-400 tracking-widest ml-1">Guests</label>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center space-x-3">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span class="font-bold text-slate-800">2 Adults</span>
                </div>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold h-[60px] rounded-2xl shadow-lg shadow-blue-200 transition">Search Voyages</button>
        </div>
    </div>
</body>
</html>
