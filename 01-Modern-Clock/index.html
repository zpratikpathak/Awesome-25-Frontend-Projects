<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Clock - Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-slate-900 flex items-center justify-center min-h-screen">
    <div class="text-center">
        <div id="date" class="text-slate-500 uppercase tracking-widest text-sm mb-2"></div>
        <div id="clock" class="text-8xl font-light tabular-nums tracking-tight">00:00:00</div>
        <div class="mt-8 flex justify-center space-x-4">
            <button onclick="toggleFormat()" class="px-4 py-2 border border-slate-200 rounded-full text-xs hover:bg-slate-50 transition">TOGGLE 24H</button>
        </div>
    </div>
    <script>
        let is24Hour = true;
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            if (!is24Hour) {
                h = h % 12 || 12;
            }
            h = String(h).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }
        function toggleFormat() {
            is24Hour = !is24Hour;
            updateClock();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
