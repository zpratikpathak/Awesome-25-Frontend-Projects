<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker - Health & Wellness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; }
        .activity-card {
            background: linear-gradient(145deg, #111, #000);
            border: 1px solid #222;
        }
    </style>
</head>
<body class="text-white p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black uppercase italic tracking-tighter">Velocity</h1>
                <p class="text-emerald-500 text-xs font-bold uppercase tracking-widest">Active Tracking</p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-right">
                    <div class="text-xs text-zinc-500 font-bold uppercase">Today</div>
                    <div class="font-bold">April 17</div>
                </div>
                <div class="w-12 h-12 bg-zinc-800 rounded-2xl"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="activity-card p-8 rounded-[32px] relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-8">
                    <svg class="w-8 h-8 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"></path></svg>
                </div>
                <div class="text-zinc-500 text-sm font-bold uppercase tracking-widest mb-2">Calories Burned</div>
                <div class="text-6xl font-black mb-4 tracking-tighter">1,240 <span class="text-xl text-zinc-600">KCAL</span></div>
                <div class="w-full h-2 bg-zinc-900 rounded-full overflow-hidden">
                    <div class="bg-emerald-500 h-full w-3/4 shadow-[0_0_15px_rgba(16,185,129,0.5)]"></div>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="activity-card p-6 rounded-[32px] flex flex-col justify-between">
                    <div class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Steps</div>
                    <div class="text-3xl font-black italic">8,420</div>
                    <div class="text-zinc-700 text-[10px] font-bold">Goal: 10k</div>
                </div>
                <div class="activity-card p-6 rounded-[32px] flex flex-col justify-between">
                    <div class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Heart Rate</div>
                    <div class="text-3xl font-black italic text-rose-500">72 <span class="text-xs text-zinc-600">BPM</span></div>
                    <div class="text-zinc-700 text-[10px] font-bold">Resting</div>
                </div>
            </div>
        </div>

        <h2 class="text-xl font-black uppercase italic tracking-tighter mb-6">Recent Workouts</h2>
        <div class="space-y-4">
            <div class="activity-card p-6 rounded-3xl flex items-center justify-between group hover:border-emerald-500/50 transition">
                <div class="flex items-center space-x-6">
                    <div class="w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500 group-hover:bg-emerald-500 group-hover:text-black transition duration-500">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div>
                        <div class="font-black italic uppercase text-lg">Morning HIIT</div>
                        <div class="text-xs text-zinc-500 font-bold uppercase">45 Mins · High Intensity</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="font-black italic text-emerald-500">+450 KCAL</div>
                    <div class="text-[10px] text-zinc-700 font-bold uppercase">Completed</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
